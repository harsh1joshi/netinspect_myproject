<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NetInspect</title>

  <link rel="stylesheet" href="/static/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="/static/chart.js"></script>
</head>

<body>

<div class="sidebar">
  <h2>NetInspect</h2>
  <a onclick="showSection('dashboard')">Dashboard</a>
  <a onclick="showSection('history')">History</a>
  <a href="/logout">Logout</a>
</div>

<div class="main">

<div id="dashboard" class="section active">

  <div class="scan-panel" style="display:flex;gap:10px;flex-wrap:wrap;">
    <input id="target" placeholder="Target IP / Domain">
    <select id="scanMode">
      <option value="fast">Fast Scan</option>
      <option value="full">Full Scan</option>
    </select>

    <button class="primary" onclick="startScan()">Start Scan</button>

    <button class="secondary" onclick="exportFile('word')">Export Report (.docx)</button>
    <button class="secondary" onclick="exportFile('csv')">Export CSV</button>
  </div>

  <div class="cards">
    <div class="card">
      <span>Status</span>
      <h3 id="scanStatus">Idle</h3>
    </div>
    <div class="card">
      <span>Operating System</span>
      <h3 id="hostOS">-</h3>
    </div>
    <div class="card">
      <span>Time Taken</span>
      <h3 id="scanTime">-</h3>
    </div>
  </div>

  <div class="chart-box">
    <h3>Severity Distribution</h3>
    <div class="chart-wrapper">
      <canvas id="severityChart"></canvas>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Port</th>
        <th>Service</th>
        <th>Version</th>
        <th>Finding</th>
        <th>Severity</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

</div>

<div id="history" class="section">
  <h3>Scan History</h3>
  <table>
    <tbody id="historyTable"></tbody>
  </table>
</div>

</div>

<script src="/static/main.js"></script>
</body>
</html>
